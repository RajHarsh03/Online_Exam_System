<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Registration — Prashiksha</title>
  <meta name="description" content="Register your institution on Prashiksha examination platform." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--surface) 0%, #e8f5ef 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: var(--space-lg) var(--space-md);
    }

    /* Brand header */
    .brand-header { text-align: center; margin-bottom: var(--space-md); }
    .brand-icon-wrap {
      width: 56px; height: 56px;
      background: var(--primary-container);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-xs);
    }
    .brand-icon-wrap .material-symbols-rounded { font-size: 28px; color: var(--primary); }
    .brand-title {
      font-family: var(--font-display);
      font-size: 1.375rem; font-weight: 800;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .brand-tagline { color: var(--secondary); font-size: 0.8125rem; }

    /* Registration card */
    .reg-card {
      background: var(--surface-lowest);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      width: 100%; max-width: 440px;
      box-shadow: var(--shadow-float);
    }

    .reg-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 800; margin-bottom: var(--space-md); }

    .form-fields { display: flex; flex-direction: column; gap: var(--space-sm); margin-bottom: var(--space-md); }

    .alt-link { text-align: center; font-size: 0.8125rem; color: var(--secondary); margin-top: var(--space-xs); }
    .alt-link a { color: var(--primary); font-weight: 600; }
    .alt-link a:hover { text-decoration: underline; }

    .password-strength {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-bar {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--surface-high);
      transition: background 0.3s;
    }
    .strength-bar.active-w  { background: #ef4444; }
    .strength-bar.active-m  { background: #f59e0b; }
    .strength-bar.active-s  { background: var(--primary); }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--on-surface); color: #fff; padding: 10px 20px;
      border-radius: var(--radius-full); font-size: 0.8125rem; font-weight: 500;
      box-shadow: var(--shadow-float); z-index: 999;
      opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Brand header -->
  <div class="brand-header">
    <div class="brand-icon-wrap">
      <span class="material-symbols-rounded">account_balance</span>
    </div>
    <h1 class="brand-title">Prashiksha</h1>
    <p class="brand-tagline">Online Examination Platform</p>
  </div>

  <!-- Registration card -->
  <div class="reg-card">
    <h2 class="reg-title">Admin Registration</h2>

    <form id="regForm" novalidate>
      <div class="form-fields">

        <div class="field-group">
          <label class="field-label" for="regLoginName">Login Name</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded icon">manage_accounts</span>
            <input type="text" id="regLoginName" name="loginName" placeholder="Enter login name" autocomplete="username" />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="instituteName">Institute Name</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded icon">school</span>
            <input type="text" id="instituteName" name="instituteName" placeholder="Official institute name" />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded icon">mail</span>
            <input type="email" id="email" name="email" placeholder="admin@institute.edu" autocomplete="email" />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="regPassword">Password</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded icon">lock</span>
            <input type="password" id="regPassword" name="password" placeholder="Create a strong password" autocomplete="new-password" />
            <button type="button" id="togglePwd" style="background:none;border:none;cursor:pointer;color:var(--secondary);display:flex;">
              <span class="material-symbols-rounded" style="font-size:20px;" id="eyeIcon">visibility</span>
            </button>
          </div>
          <div class="password-strength" id="strengthBars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
          </div>
        </div>

      </div>

      <button type="submit" class="btn btn-primary btn-full" id="regBtn">
        Register
      </button>
    </form>

    <p class="alt-link" style="margin-top: var(--space-sm);">
      Already have an account? <a href="admin_login.html">Sign in</a>
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Toggle password
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('regPassword');
      const eye = document.getElementById('eyeIcon');
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      eye.textContent = isHidden ? 'visibility_off' : 'visibility';
    });

    // Password strength
    document.getElementById('regPassword').addEventListener('input', (e) => {
      const val = e.target.value;
      const len   = val.length;
      const hasNum = /\d/.test(val);
      const hasSym = /[^a-zA-Z0-9]/.test(val);
      const hasUpper = /[A-Z]/.test(val);

      let strength = 0;
      if (len >= 6) strength++;
      if (len >= 10 && hasNum) strength++;
      if (hasSym && hasUpper) strength++;

      const classes = ['active-w','active-m','active-s'];
      for (let i = 1; i <= 3; i++) {
        const bar = document.getElementById('bar' + i);
        bar.className = 'strength-bar';
        if (i <= strength) bar.classList.add(classes[strength - 1]);
      }
    });

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Form submit
    document.getElementById('regForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name  = document.getElementById('regLoginName').value.trim();
      const inst  = document.getElementById('instituteName').value.trim();
      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('regPassword').value;

      if (!name || !inst || !email || !pwd) { showToast('Please fill in all fields.'); return; }
      if (!/\S+@\S+\.\S+/.test(email)) { showToast('Please enter a valid email address.'); return; }
      if (pwd.length < 6) { showToast('Password must be at least 6 characters.'); return; }

      const btn = document.getElementById('regBtn');
      btn.textContent = 'Registering…';
      btn.disabled = true;

      setTimeout(() => {
        showToast('Account created successfully! Redirecting to login…');
        setTimeout(() => window.location.href = 'admin_login.html', 1800);
      }, 1200);
    });
  </script>
</body>
</html>
