<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>Admin Login — Prashiksha</title>
  <meta name="description" content="Secure administration portal login for Prashiksha examination platform." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/clerk-overrides.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script defer crossorigin="anonymous" src="https://close-snapper-5.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js" type="text/javascript"></script>
  <script defer crossorigin="anonymous" data-clerk-publishable-key="pk_test_Y2xvc2Utc25hcHBlci01LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://close-snapper-5.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js" type="text/javascript"></script>
  <style>
    body { min-height: 100vh; background: var(--surface); display: flex; align-items: center; justify-content: center; padding: var(--space-lg); }

    .login-shell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 920px;
      width: 100%;
      min-height: 480px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 20px 48px rgba(44,52,55,0.12);
    }

    /* Left image panel */
    .login-image {
      position: relative;
      background: url('admin_login_hero.png') center/cover no-repeat;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: var(--space-lg);
    }
    .login-image::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,40,30,0.82) 0%, rgba(0,20,15,0.35) 60%, transparent 100%);
    }
    .login-image > * { position: relative; z-index: 1; }
    .img-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      color: rgba(255,255,255,0.9);
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: var(--space-sm);
      width: fit-content;
    }
    .img-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800;
      color: #ffffff; line-height: 1.15;
      margin-bottom: var(--space-xs);
    }
    .img-desc { font-size: 0.8125rem; color: rgba(255,255,255,0.75); max-width: 280px; line-height: 1.55; }

    /* Right form panel */
    .login-form-panel {
      background: var(--surface-lowest);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-md);
      position: relative;
      overflow-y: auto;
    }
    .login-form-panel > * { width: 100%; max-width: 440px; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--on-surface); color: #fff; padding: 12px 24px;
      border-radius: var(--radius-full); font-size: 0.875rem; font-weight: 500;
      box-shadow: var(--shadow-float); z-index: 999;
      opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      body { align-items: stretch; padding: var(--space-md); }
      .login-shell { grid-template-columns: 1fr; min-height: auto; }
      .login-image { min-height: 200px; }
    }
    @media (max-width: 560px) {
      body { padding: 8px; }
      .login-image { display: none; }
      .login-form-panel { padding: 12px 10px; }
    }
  </style>
</head>
<body>

  <div class="login-shell">

    <!-- Left: Image Panel -->
    <div class="login-image">
      <div class="img-badge">
        <span class="material-symbols-rounded" style="font-size:16px;">account_balance</span>
        Institutional Access
      </div>
      <h1 class="img-title">The Focused<br>Scholar</h1>
      <p class="img-desc">Secure administration portal for managing rigorous academic evaluations and institutional records.</p>
    </div>

    <!-- Right: Form Panel -->
    <div class="login-form-panel">
      <div id="clerk-sign-in"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/clerk-appearance.js"></script>
  <script>
    window.addEventListener('load', async function () {
      await Clerk.load({ ui: { ClerkUI: window.__internal_ClerkUICtor } });
      if (Clerk.user) { window.location.href = 'admin_dashboard.html'; return; }
      Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
        appearance: clerkAppearance,
      });
    });
  </script>
</body>
</html>
