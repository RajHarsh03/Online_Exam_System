<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>Admin Login — Prashiksha</title>
  <meta name="description" content="Secure administration portal login for Prashiksha examination platform." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    body { min-height: 100vh; background: var(--surface); display: flex; align-items: center; justify-content: center; padding: var(--space-lg); }

    .login-shell {
      display: grid; grid-template-columns: 1fr 1fr;
      max-width: 920px; width: 100%; min-height: 480px;
      border-radius: var(--radius-xl); overflow: hidden;
      box-shadow: 0 20px 48px rgba(44,52,55,0.12);
    }

    .login-image {
      position: relative;
      background: url('admin_login_hero.png') center/cover no-repeat;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: var(--space-lg);
    }
    .login-image::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,40,30,0.82) 0%, rgba(0,20,15,0.35) 60%, transparent 100%);
    }
    .login-image > * { position: relative; z-index: 1; }
    .img-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px; border-radius: var(--radius-full);
      color: rgba(255,255,255,0.9); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: var(--space-sm); width: fit-content;
    }
    .img-title {
      font-family: var(--font-display); font-size: 2rem; font-weight: 800;
      color: #ffffff; line-height: 1.15; margin-bottom: var(--space-xs);
    }
    .img-desc { font-size: 0.8125rem; color: rgba(255,255,255,0.75); max-width: 280px; line-height: 1.55; }

    .login-form-panel {
      background: var(--surface-lowest);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-lg); overflow-y: auto;
    }
    .form-card { width: 100%; max-width: 380px; }
    .form-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
    .form-subtitle { color: var(--secondary); font-size: 0.8125rem; margin-bottom: var(--space-lg); line-height: 1.5; }

    .form-fields { display: flex; flex-direction: column; gap: var(--space-sm); margin-bottom: var(--space-md); }

    .field-group .field-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--on-surface); margin-bottom: 6px; }
    .field-group .input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-high); border-radius: var(--radius-md);
      padding: 0 14px; border: 1.5px solid transparent; transition: border-color 0.2s;
    }
    .field-group .input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,109,74,0.08); }
    .field-group .input-wrap .material-symbols-rounded { color: var(--secondary); font-size: 20px; }
    .field-group .input-wrap input {
      flex: 1; background: transparent; border: none; outline: none;
      padding: 12px 0; font-size: 0.875rem; color: var(--on-surface);
    }
    .field-group .input-wrap input::placeholder { color: var(--on-surface-variant); }

    .btn-full {
      width: 100%; padding: 12px; border-radius: var(--radius-md);
      background: var(--primary); color: var(--on-primary);
      font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,109,74,0.2);
    }
    .btn-full:hover { background: #005a3d; box-shadow: 0 4px 14px rgba(0,109,74,0.3); }
    .btn-full:disabled { opacity: 0.6; cursor: not-allowed; }

    .form-error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 10px 14px; border-radius: var(--radius-md); font-size: 0.8125rem;
      margin-bottom: var(--space-sm); display: none;
    }

    .support-link {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      margin-top: var(--space-md); font-size: 0.8125rem; color: var(--secondary);
    }
    .support-link a { color: var(--primary); font-weight: 600; }

    @media (max-width: 768px) {
      body { padding: var(--space-md); }
      .login-shell { grid-template-columns: 1fr; min-height: auto; }
      .login-image { min-height: 200px; }
    }
    @media (max-width: 560px) {
      body { padding: 0; }
      .login-shell { border-radius: 0; box-shadow: none; min-height: 100vh; }
      .login-image { display: none; }
      .login-form-panel { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="login-shell">
    <div class="login-image">
      <div class="img-badge">
        <span class="material-symbols-rounded" style="font-size:16px;">account_balance</span>
        Institutional Access
      </div>
      <h1 class="img-title">The Focused<br>Scholar</h1>
      <p class="img-desc">Secure administration portal for managing rigorous academic evaluations and institutional records.</p>
    </div>

    <div class="login-form-panel">
      <div class="form-card">
        <h2 class="form-title">Admin Portal</h2>
        <p class="form-subtitle">Sign in with your administrator credentials to manage the examination platform.</p>

        <div class="form-error" id="formError"></div>

        <form id="loginForm" novalidate>
          <div class="form-fields">
            <div class="field-group">
              <label class="field-label" for="email">Email Address</label>
              <div class="input-wrap">
                <span class="material-symbols-rounded">mail</span>
                <input type="email" id="email" placeholder="admin@prashiksha.edu" required autocomplete="email" />
              </div>
            </div>
            <div class="field-group">
              <label class="field-label" for="password">Password</label>
              <div class="input-wrap">
                <span class="material-symbols-rounded">lock</span>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
              </div>
            </div>
          </div>

          <button type="submit" class="btn-full" id="submitBtn">Sign In</button>
        </form>

        <p class="support-link">Student? <a href="student_login.html">Student Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in as admin; clear if different role
    if (isLoggedIn()) {
      const user = getUser();
      if (user?.role === 'admin') {
        window.location.href = 'admin_dashboard.html';
      } else {
        clearAuth(); // Let them log in as admin
      }
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        if (data.user.role !== 'admin') {
          throw new Error('This portal is for administrators only.');
        }

        saveAuth(data.token, data.user);
        window.location.href = 'admin_dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
