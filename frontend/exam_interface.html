<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>Exam — Prashiksha</title>
  <meta name="description" content="Online examination interface for Prashiksha." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    body { background: var(--surface); }

    /* ── Exam header ── */
    .exam-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px var(--space-md);
      background: var(--surface-lowest);
      border-bottom: 1px solid var(--surface-high);
      position: sticky; top: 0; z-index: 100;
      gap: 4px;
    }
    .exam-info { display: flex; flex-direction: column; }
    .exam-name { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; }
    .exam-sub  { font-size: 0.65rem; color: var(--secondary); margin-top: 0px; }

    /* Timer widget */
    .timer-widget {
      display: flex; align-items: center; gap: 4px;
      background: var(--on-surface);
      border-radius: var(--radius-full);
      padding: 4px 8px;
      color: #fff;
      flex-shrink: 0;
    }
    .timer-widget .material-symbols-rounded { font-size: 14px; color: var(--primary-container); }
    .timer-value { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.04em; }
    .timer-widget.warning { background: #991b1b; }
    .timer-widget.warning .material-symbols-rounded { color: #fca5a5; }

    /* Submit button */
    .submit-btn {
      border-radius: var(--radius-xl);
      padding: 4px 8px; font-weight: 600; font-size: 0.7rem;
      background: var(--surface-low); color: var(--on-surface-variant);
      border: 1px solid var(--outline-variant);
      cursor: pointer; transition: all var(--transition);
      flex-shrink: 0;
    }
    .submit-btn:hover { background: var(--surface-high); color: var(--on-surface); }

    /* ── Question area ── */
    .exam-body { max-width: 740px; margin: 0 auto; padding: var(--space-md) var(--space-lg); padding-bottom: 70px; }

    /* Quick question switcher */
    .question-grid-panel {
      position: fixed;
      left: 14px;
      top: 96px;
      width: 60px;
      background: var(--surface-lowest);
      border: 1px solid var(--surface-high);
      border-radius: var(--radius-lg);
      padding: 8px;
      box-shadow: var(--shadow-card);
      z-index: 90;
    }
    .question-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }
    .q-grid-btn {
      width: 100%;
      height: 24px;
      border-radius: 8px;
      border: 1px solid var(--outline-variant);
      background: var(--surface-lowest);
      color: var(--on-surface);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      padding: 0;
    }
    .q-grid-btn:hover { border-color: var(--primary); }
    .q-grid-btn.current {
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px var(--primary);
    }
    .q-grid-btn.answered {
      background: #16a34a;
      border-color: #15803d;
      color: #fff;
    }
    .q-grid-btn.flagged {
      background: #dc2626;
      border-color: #b91c1c;
      color: #fff;
    }

    /* Q progress row */
    .q-progress-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-sm); margin-bottom: var(--space-md); flex-wrap: wrap;
    }
    .q-number-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface-high); border-radius: var(--radius-full);
      padding: 4px 10px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .q-number-badge em { font-style: normal; color: var(--secondary); font-weight: 400; }
    .flag-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.8rem; font-weight: 500; color: var(--secondary);
      background: none; border: none; cursor: pointer;
      transition: color var(--transition); padding: 4px 8px; flex-shrink: 0;
    }
    .flag-btn:hover { color: var(--primary); }
    .flag-btn.flagged { color: #dc2626; }

    /* Question card */
    .question-card {
      background: var(--surface-lowest); border-radius: var(--radius-xl);
      padding: var(--space-lg); box-shadow: var(--shadow-card); margin-bottom: var(--space-md);
    }
    .question-text {
      font-family: var(--font-body); font-size: 0.9375rem; line-height: 1.7;
      color: var(--on-surface); margin-bottom: var(--space-lg);
    }

    /* Answer options */
    .options-list { display: flex; flex-direction: column; gap: var(--space-sm); }
    .option {
      display: flex; align-items: flex-start; gap: var(--space-sm);
      padding: 14px 16px; border-radius: var(--radius-lg);
      background: var(--surface-high); cursor: pointer;
      border: 2px solid transparent; transition: all var(--transition);
    }
    .option:hover { background: var(--surface-low); border-color: var(--outline-variant); }
    .option.selected { background: rgba(105,246,184,0.18); border-color: var(--primary-container); }
    .option-radio {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--surface-highest);
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition); margin-top: 2px;
    }
    .option.selected .option-radio { border-color: var(--primary); background: var(--primary); }
    .option.selected .option-radio::after {
      content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: #fff;
    }
    .option-text { font-size: 0.8125rem; line-height: 1.55; color: var(--on-surface); flex: 1; }

    /* Nav footer */
    .exam-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-sm); padding: 8px var(--space-md);
      background: var(--surface-lowest); border-top: 1px solid var(--surface-high);
      position: fixed; bottom: 0; left: 0; right: 0; flex-wrap: wrap;
    }
    .prev-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.8rem; font-weight: 600; color: #fff;
      background: #2563eb; border: 1px solid #1d4ed8; cursor: pointer;
      transition: all var(--transition); padding: 6px 10px; flex-shrink: 0;
      border-radius: var(--radius-md);
    }
    .prev-btn:hover { background: #1d4ed8; border-color: #1e40af; }
    .prev-btn:disabled { opacity: 0.4; cursor: default; }
    .exam-footer .btn { padding: 6px 12px; font-size: 0.8rem; flex-shrink: 0; }

    /* Loading / Error state */
    .loading-state {
      text-align: center; padding: 80px 20px;
      color: var(--secondary); font-size: 0.9rem;
    }
    .loading-state .material-symbols-rounded { font-size: 40px; display: block; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .exam-header { padding: 6px var(--space-sm); gap: 6px; }
      .exam-body { padding: var(--space-sm); padding-bottom: 80px; }
      .question-card { padding: var(--space-md); }
      .exam-footer { padding: 8px var(--space-sm); gap: 6px; }
      .question-grid-panel {
        left: 8px;
        top: auto;
        bottom: 88px;
        width: calc(100% - 16px);
      }
      .question-grid { grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); }
      .q-grid-btn { height: 28px; }
    }
    @media (max-width: 560px) {
      .exam-footer { flex-direction: row; align-items: center; gap: 4px; }
      .exam-footer .btn, .prev-btn, .submit-btn { padding: 6px 10px; font-size: 0.75rem; flex-shrink: 0; }
    }
  </style>
</head>
<body>

  <aside class="question-grid-panel" id="questionGridPanel" aria-label="Question navigator">
    <div class="question-grid" id="questionGrid"></div>
  </aside>

  <!-- Exam header -->
  <header class="exam-header">
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <div style="width:28px;height:28px;border-radius:var(--radius-md);background:var(--primary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span class="material-symbols-rounded" style="color:var(--primary);font-size:16px;">menu_book</span>
      </div>
      <div class="exam-info">
        <div class="exam-name" id="examName">Loading…</div>
        <div class="exam-sub" id="examSub">Please wait</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;">
      <div class="timer-widget" id="timerWidget">
        <span class="material-symbols-rounded">timer</span>
        <span class="timer-value" id="timer">--:--</span>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitExam()">Submit Exam</button>
    </div>
  </header>

  <!-- Question body -->
  <div class="exam-body" id="examBody">
    <div class="loading-state">
      <span class="material-symbols-rounded">hourglass_top</span>
      Loading exam…
    </div>
  </div>

  <!-- Footer navigation -->
  <div class="exam-footer">
    <button class="prev-btn" id="prevBtn" onclick="prevQuestion()" disabled>
      Previous Question
    </button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">
      Next
    </button>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // ── Auth guard ──
    const currentUser = requireStudent();

    // ── Load exam from sessionStorage (set during join flow) ──
    let exam = null;
    let questions = [];
    let currentQ = 0;
    let answers   = {};   // { questionId: selectedOptionIndex }
    let flagged   = {};   // { questionId: bool }
    let timerInterval = null;
    let secondsLeft   = 0;

    function init() {
      const raw = sessionStorage.getItem('activeExam');
      if (!raw) {
        showError('No active exam found. Please join an exam from your dashboard.');
        return;
      }

      exam = JSON.parse(raw);

      // Set header info
      document.title = `${exam.title} — Prashiksha`;
      document.getElementById('examName').textContent = exam.title;
      document.getElementById('examSub').textContent =
        `${exam.subject} • ${currentUser ? currentUser.name : 'Student'}`;

      // Set up questions
      if (!exam.questions || exam.questions.length === 0) {
        showError('This exam has no questions yet. Please contact your instructor.');
        return;
      }

      questions = exam.questions;
      answers   = {};
      flagged   = {};

      // Start timer — exam.duration is in minutes
      secondsLeft = (exam.duration || 30) * 60;
      startTimer();

      // Render first question
      renderQuestion();
    }

    // ── Timer ──
    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        secondsLeft--;
        updateTimerDisplay();
        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          autoSubmit();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const h = Math.floor(secondsLeft / 3600);
      const m = Math.floor((secondsLeft % 3600) / 60);
      const s = secondsLeft % 60;
      const display = h > 0
        ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      document.getElementById('timer').textContent = display;
      // Warning when < 5 mins
      document.getElementById('timerWidget').classList.toggle('warning', secondsLeft < 300);
    }

    // ── Render question ──
    function renderQuestion() {
      const body = document.getElementById('examBody');
      const q = questions[currentQ];
      const qId = q._id || q.id || currentQ;
      const opts = q.options || [];

      body.innerHTML = `
        <div class="q-progress-row">
          <div class="q-number-badge">
            Question <span id="qNum">${currentQ + 1}</span>
            <em>of <span id="qTotal">${questions.length}</span></em>
          </div>
          <button class="flag-btn ${flagged[qId] ? 'flagged' : ''}" id="flagBtn" onclick="toggleFlag()">
            <span class="material-symbols-rounded" style="font-size:16px;">bookmark</span>
            ${flagged[qId] ? 'Flagged' : 'Flag for review'}
          </button>
        </div>

        <div class="question-card">
          <p class="question-text">${q.text || q.questionText || 'Question text unavailable'}</p>
          <div class="options-list" id="optionsList">
            ${opts.map((opt, i) => `
              <div class="option ${answers[qId] === i ? 'selected' : ''}"
                   onclick="selectOption(${i})" id="opt${i}">
                <div class="option-radio"></div>
                <span class="option-text">${opt.text || opt}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('prevBtn').disabled = currentQ === 0;
      document.getElementById('nextBtn').textContent =
        currentQ === questions.length - 1 ? 'Submit Exam' : 'Next';

      renderQuestionGrid();
    }

    function renderQuestionGrid() {
      const grid = document.getElementById('questionGrid');
      if (!grid) return;

      grid.innerHTML = questions.map((q, index) => {
        const qId = q._id || q.id || index;
        const isAnswered = answers[qId] !== undefined;
        const isFlagged = !!flagged[qId];
        const isCurrent = index === currentQ;
        return `
          <button
            class="q-grid-btn ${isAnswered ? 'answered' : ''} ${isFlagged ? 'flagged' : ''} ${isCurrent ? 'current' : ''}"
            onclick="jumpToQuestion(${index})"
            title="Question ${index + 1}"
            aria-label="Go to question ${index + 1}">
            ${index + 1}
          </button>
        `;
      }).join('');
    }

    function jumpToQuestion(index) {
      if (index < 0 || index >= questions.length) return;
      currentQ = index;
      renderQuestion();
      window.scrollTo(0, 0);
    }

    // ── Select an option ──
    function selectOption(idx) {
      const q = questions[currentQ];
      const qId = q._id || q.id || currentQ;
      answers[qId] = idx;

      // Update UI without full re-render
      document.querySelectorAll('.option').forEach((el, i) => {
        el.classList.toggle('selected', i === idx);
      });

      renderQuestionGrid();
    }

    // ── Flag toggle ──
    function toggleFlag() {
      const q = questions[currentQ];
      const qId = q._id || q.id || currentQ;
      flagged[qId] = !flagged[qId];
      const btn = document.getElementById('flagBtn');
      if (btn) {
        btn.classList.toggle('flagged', flagged[qId]);
        btn.innerHTML = `<span class="material-symbols-rounded" style="font-size:16px;">bookmark</span>
          ${flagged[qId] ? 'Flagged' : 'Flag for review'}`;
      }
      renderQuestionGrid();
    }

    // ── Navigation ──
    function nextQuestion() {
      if (currentQ < questions.length - 1) {
        currentQ++;
        renderQuestion();
        window.scrollTo(0, 0);
      } else {
        submitExam();
      }
    }

    function prevQuestion() {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
        window.scrollTo(0, 0);
      }
    }

    // ── Submit ──
    function submitExam() {
      const answered = Object.keys(answers).length;
      const total    = questions.length;
      const unanswered = total - answered;

      const msg = unanswered > 0
        ? `You have ${unanswered} unanswered question(s). Submit anyway?`
        : 'Submit the exam? This cannot be undone.';

      if (!confirm(msg)) return;
      doSubmit();
    }

    function autoSubmit() {
      alert('Time is up! Your exam is being submitted automatically.');
      doSubmit();
    }

    async function doSubmit() {
      clearInterval(timerInterval);
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('submitBtn').textContent = 'Submitting…';

      // Build submission payload to match /api/results expectations
      const answersPayload = questions.map((q, idx) => {
        const qId = q._id || q.id || String(idx);
        return {
          questionId:     qId,
          selectedOption: answers[qId] !== undefined ? answers[qId] : null,
        };
      });

      const timeTaken = (exam.duration * 60) - secondsLeft; // seconds spent

      try {
        const result = await apiFetch(`/api/results`, {
          method: 'POST',
          body: JSON.stringify({
            examId:    exam._id,
            answers:   answersPayload,
            timeTaken,
          }),
        });
        // Save full result + exam context for the result page
        sessionStorage.setItem('examResult', JSON.stringify(result));
        sessionStorage.setItem('activeExam',  JSON.stringify(exam));
        window.location.href = 'exam_result.html';
      } catch (err) {
        // Re-enable button so student can retry
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = 'Submit Exam';
        alert(`Submission failed: ${err.message}\n\nPlease try again or contact your instructor.`);
      }
    }

    // ── Error state ──
    function showError(msg) {
      document.getElementById('examBody').innerHTML = `
        <div class="loading-state">
          <span class="material-symbols-rounded">error</span>
          ${msg}
          <br><br>
          <a href="student_dashboard.html" class="btn btn-primary" style="display:inline-flex;gap:6px;align-items:center;margin-top:8px;">
            <span class="material-symbols-rounded" style="font-size:16px;">arrow_back</span>
            Back to Dashboard
          </a>
        </div>`;
      document.getElementById('timer').textContent = '--:--';
    }

    // ── Start ──
    init();
  </script>
</body>
</html>
